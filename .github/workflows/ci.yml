name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Falhar no primeiro erro de compilação em vez de gastar minutos de runner.
  CARGO_INCREMENTAL: 0

jobs:
  ci:
    name: build · test · clippy · fmt · doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # O `iced` puxa ~600 crates; sem cache cada job é uma eternidade.
      - uses: Swatinem/rust-cache@v2

      # Dependências de sistema do iced/winit no Linux (não vêm no runner).
      - name: Dependências de sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libxcursor-dev libxrandr-dev \
            libxi-dev libx11-dev libgl1-mesa-dev pkg-config

      - name: Formatação
        run: cargo fmt --all --check

      # `-D warnings` é o ponto: um warning novo é um erro. O crate está em zero
      # e a única forma de continuar em zero é o CI recusar o primeiro.
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets

      # Os testes cobrem o motor inteiro, inclusive o cache de avaliação — que é
      # a única parte capaz de produzir UI silenciosamente desatualizada, e por
      # isso a que mais precisa de um porteiro (ver `render_inputs`).
      - name: Testes
        run: cargo test --all-features

      # `cargo doc` pega link quebrado em doc-comment, que é metade da
      # documentação desta crate.
      - name: Doc
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings
